<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>anduril2.ru</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="top-actions">
      <div class="top-title">
        <div>Anduril 2 UI RU</div>
        <div class="top-title-meta">
          <span>Ver. 2.1.0 (14-05-2026)</span>
        </div>
      </div>
      <div class="top-buttons">
        <button class="icon-button like-button" type="button" aria-label="Нравится">
          <svg class="like-icon" viewBox="0 0 256 256" aria-hidden="true">
            <path
              d="M234,80.12A24,24,0,0,0,216,72H160V56a40,40,0,0,0-40-40,8,8,0,0,0-7.16,4.42L75.06,96H32a16,16,0,0,0-16,16v88a16,16,0,0,0,16,16H204a24,24,0,0,0,23.82-21l12-96A24,24,0,0,0,234,80.12ZM32,112H72v88H32Z"
            ></path>
          </svg>
          <span class="like-count" id="likeCount">0</span>
        </button>
        <div class="copy-wrap">
          <button class="icon-button copy-button" id="copyLinkBtn" type="button">
            <img src="copy-simple-fill.svg" alt="" />
            <span>Ссылка</span>
          </button>
        </div>
        <button class="icon-button" id="downloadImageBtn" type="button">
          <img src="arrow-fat-down-fill.svg" alt="" />
          <span class="download-label">Скачать</span>
        </button>
      </div>
      <button
        class="support-button"
        type="button"
        onclick="window.open('https://pay.cloudtips.ru/p/5271c43c', '_blank', 'noopener')"
      >
        <img src="cardholder-fill.svg" alt="" />
        <span class="desktop-only">Поддержать автора</span>
        <span class="mobile-only">Поддержать</span>
      </button>
    </div>
    <div class="copy-toast" id="copyToast" role="status" aria-live="polite">
      <img src="check-fat-fill.svg" alt="" />
      <span>Ссылка скопирована</span>
    </div>
    <div class="image-wrap">
      <img id="mainImage" src="anduril2-ui.jpg" alt="Anduril 2 UI diagram" />
    </div>
    <script src="script.js"></script>
  </body>
</html>
